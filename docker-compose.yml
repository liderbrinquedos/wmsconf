services:
  frontend:
    build: ./frontend
    ports:
      - "8023:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-conferencia-secret-change-me}
      - DB_PATH=/app/data/conferencia.db
    volumes:
      - conferencia-data:/app/data

volumes:
  conferencia-data: